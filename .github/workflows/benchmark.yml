name: benchmark

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package and benchmark dependencies
        run: |
          set -o pipefail
          python -m pip install --upgrade pip 2>&1 | tee pip-upgrade.log
          python -m pip install . scipy 2>&1 | tee pip-install.log

      - name: Run benchmark
        id: run_benchmark
        run: |
          set +e
          set -o pipefail
          python benchmark.py 2>&1 | tee benchmark_stdout.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Ensure benchmark artifacts exist even on failure
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path("benchmark_report.md")
          log_path = Path("benchmark_logs.json")
          stdout_path = Path("benchmark_stdout.log")

          stdout_text = stdout_path.read_text(encoding="utf-8", errors="replace") if stdout_path.exists() else "benchmark_stdout.log was not generated."

          if not log_path.exists():
              fallback = {
                  "overall_status": "failed_setup",
                  "next_codex_action": "Read the workflow logs first. Fix the CI setup, build, dependency installation, or benchmark invocation failure before doing optimisation work.",
                  "gridoptim": {
                      "name": "gridoptim",
                      "runtime_seconds": None,
                      "best_value": None,
                      "best_params": {},
                      "error": "benchmark_logs.json was not generated",
                      "traceback_text": stdout_text,
                      "status": "failed_setup",
                  },
                  "reference": {
                      "name": "scipy.optimize.brute",
                      "runtime_seconds": None,
                      "best_value": None,
                      "best_params": {},
                      "error": "benchmark_logs.json was not generated",
                      "traceback_text": stdout_text,
                      "status": "failed_setup",
                  },
                  "same_optimum": False,
                  "winner": "no winner",
                  "speed_ratio_reference_over_gridoptim": None,
              }
              log_path.write_text(json.dumps(fallback, indent=2), encoding="utf-8")

          if not report_path.exists():
              report_path.write_text(
                  "# Benchmark report\n\n"
                  "- Overall status: `failed_setup`\n"
                  "- Error: `benchmark_report.md was not generated by benchmark.py`\n\n"
                  "## Next Codex instruction\n\n"
                  "Read the latest workflow logs and benchmark_logs.json first. Fix the CI, packaging, build, or benchmark harness failure before attempting any performance work.\n\n"
                  "## Captured stdout/stderr\n\n"
                  "```text\n"
                  f"{stdout_text.rstrip()}\n"
                  "```\n",
                  encoding="utf-8",
              )
          PY

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: |
            benchmark_report.md
            benchmark_logs.json
            benchmark_stdout.log
            pip-upgrade.log
            pip-install.log
          if-no-files-found: warn

      - name: Add workflow summary
        if: always()
        run: |
          echo '## Benchmark summary' >> "$GITHUB_STEP_SUMMARY"
          if [ -f benchmark_report.md ]; then
            cat benchmark_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'benchmark_report.md was not generated.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail job if benchmark failed
        if: steps.run_benchmark.outputs.exit_code != '0'
        run: |
          echo "Benchmark step failed with exit code ${{ steps.run_benchmark.outputs.exit_code }}"
          exit 1
