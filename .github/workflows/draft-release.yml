name: Draft release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number, for example 3.2.55"
        required: true
        type: string

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION"
            echo "Expected format: 3.2.55"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update pyproject.toml version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")

          new_text, count = re.subn(
              r'(?m)^version\s*=\s*"[^"]+"$',
              f'version = "{version}"',
              text,
              count=1,
          )

          if count != 1:
              raise SystemExit("Could not find exactly one version line in pyproject.toml")

          path.write_text(new_text, encoding="utf-8")
          PY

      - name: Commit version bump
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Bump version to $VERSION"
            git push
          fi

      - name: Create draft release with tag
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "gridoptim v$VERSION" \
            --generate-notes
