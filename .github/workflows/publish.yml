name: Release and publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number, for example 3.2.55"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      tag: ${{ steps.vars.outputs.tag }}
      tag_exists: ${{ steps.tag_check.outputs.tag_exists }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set release variables
        id: vars
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION"
            echo "Expected format: 3.2.55"
            exit 1
          fi

      - name: Check whether tag already exists
        id: tag_check
        env:
          TAG: v${{ inputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin. Reusing it."
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG does not exist yet."
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.tag_check.outputs.tag_exists == 'false'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Update pyproject.toml version
        if: steps.tag_check.outputs.tag_exists == 'false'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")

          new_text, count = re.subn(
              r'(?m)^version\s*=\s*"[^"]+"$',
              f'version = "{version}"',
              text,
              count=1,
          )

          if count != 1:
              raise SystemExit("Could not find exactly one version line in pyproject.toml")

          path.write_text(new_text, encoding="utf-8")
          PY

      - name: Commit version bump
        if: steps.tag_check.outputs.tag_exists == 'false'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Bump version to $VERSION"
            git push
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.tag_exists == 'false'
        env:
          TAG: v${{ inputs.version }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository at tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Build wheels
        run: cibuildwheel --output-dir dist
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_WINDOWS: AMD64

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/*

  sdist:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository at tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --outdir dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*

  publish:
    needs: [prepare, build, sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub release for $TAG already exists, skipping release creation."
          else
            gh release create "$TAG" \
              --title "gridoptim v$VERSION" \
              --generate-notes \
              dist/*
          fi
